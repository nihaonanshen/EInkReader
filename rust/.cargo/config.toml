[target.x86_64-pc-windows-msvc]
linker = "C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\BuildTools\\VC\\Tools\\MSVC\\14.44.35207\\bin\\Hostx64\\x64\\link.exe"

# Android NDK 交叉编译（需 NDK r27+ 安装到标准路径）
# 设置环境变量 ANDROID_NDK_HOME 或使用下面的默认路径
# 构建命令：cargo build --target <target> --release

[target.aarch64-linux-android]
linker = "clang.exe"
rustflags = ["-Clink-arg=--target=aarch64-linux-android21"]

[target.armv7-linux-androideabi]
linker = "clang.exe"
rustflags = ["-Clink-arg=--target=armv7a-linux-androideabi21"]

[target.x86_64-linux-android]
linker = "clang.exe"
rustflags = ["-Clink-arg=--target=x86_64-linux-android21"]
